<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - AI Spark</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  background-size: 200% 200%;
  animation: gradientShift 8s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Sign In Card */
.signin-card {
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(10px);
  border-radius: 28px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  padding: 45px 40px;
  width: 100%;
  max-width: 420px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.3);
}

.signin-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 30px 60px rgba(0,0,0,0.3);
}

.logo-area {
  text-align: center;
  margin-bottom: 35px;
}

.logo-area h1 {
  color: #0f172a;
  font-size: 2rem;
  margin-bottom: 8px;
}

.logo-area p {
  color: #64748b;
  font-size: 0.9rem;
}

/* Form */
.form-group {
  margin-bottom: 22px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: #0f172a;
  font-weight: 600;
  font-size: 0.9rem;
}

.form-group input {
  width: 100%;
  padding: 13px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 1rem;
  transition: 0.2s;
  background: #ffffff;
}

.form-group input:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
}

.options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  font-size: 0.85rem;
}

.remember {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #64748b;
  cursor: pointer;
}

.forgot {
  color: #667eea;
  text-decoration: none;
  font-weight: 500;
}

.forgot:hover {
  text-decoration: underline;
}

.signin-btn {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  width: 100%;
  transition: 0.3s;
}

.signin-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(102,126,234,0.4);
}

.divider {
  text-align: center;
  margin: 28px 0;
  position: relative;
}

.divider::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: #e2e8f0;
}

.divider span {
  background: white;
  padding: 0 15px;
  position: relative;
  color: #64748b;
  font-size: 0.85rem;
}

.social-login {
  display: flex;
  gap: 15px;
  margin-bottom: 25px;
}

.social-btn {
  flex: 1;
  padding: 11px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  background: white;
  cursor: pointer;
  font-size: 1.1rem;
  font-weight: 600;
  transition: 0.2s;
}

.social-btn:hover {
  background: #f8fafc;
  transform: translateY(-2px);
  border-color: #667eea;
}

.signup-link {
  text-align: center;
  color: #64748b;
  font-size: 0.9rem;
}

.signup-link a {
  color: #667eea;
  text-decoration: none;
  font-weight: 600;
}

.signup-link a:hover {
  text-decoration: underline;
}

.error-message {
  background: linear-gradient(135deg, #fee2e2, #fecaca);
  color: #dc2626;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 20px;
  text-align: center;
  font-size: 0.85rem;
  font-weight: 500;
  display: none;
}

.demo-credentials {
  text-align: center;
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px dashed #e2e8f0;
  font-size: 0.75rem;
  color: #94a3b8;
}

.demo-credentials span {
  font-weight: 600;
  color: #667eea;
}

@media (max-width: 480px) {
  .signin-card {
    padding: 30px 25px;
  }
  .logo-area h1 {
    font-size: 1.6rem;
  }
}
</style>
</head>
<body>

<div class="signin-card">
  <div class="logo-area">
    <h1>✨ AI Spark</h1>
    <p>Sign in to continue your learning journey</p>
  </div>

  <div id="errorMsg" class="error-message"></div>

  <form id="signinForm">
    <div class="form-group">
      <label>📧 Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label>🔒 Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox"> Remember me
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button type="submit" class="signin-btn">Sign In →</button>
  </form>

  <div class="divider">
    <span>or continue with</span>
  </div>

  <div class="social-login">
    <button class="social-btn" onclick="alert('Google Sign In')">G</button>
    <button class="social-btn" onclick="alert('Facebook Sign In')">f</button>
    <button class="social-btn" onclick="alert('Apple Sign In')">🍎</button>
  </div>

  <div class="signup-link">
    New to AI Spark? <a href="signup.html">Create an account</a>
  </div>

  <div class="demo-credentials">
    💡 <span>Demo:</span> user@example.com | password123
  </div>
</div>

<script>
  const form = document.getElementById('signinForm');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if(!email || !password) {
      errorMsg.textContent = '❌ Please fill in all fields';
      errorMsg.style.display = 'block';
      return;
    }
    
    if(!email.includes('@') || !email.includes('.')) {
      errorMsg.textContent = '❌ Please enter a valid email address';
      errorMsg.style.display = 'block';
      return;
    }
    
    if(password.length < 6) {
      errorMsg.textContent = '❌ Password must be at least 6 characters';
      errorMsg.style.display = 'block';
      return;
    }
    
    errorMsg.style.display = 'none';
    alert('✅ Sign in successful! Welcome back to AI Spark.');
  });
  
  document.getElementById('email').addEventListener('input', () => {
    errorMsg.style.display = 'none';
  });
  document.getElementById('password').addEventListener('input', () => {
    errorMsg.style.display = 'none';
  });
</script>

</body>
</html>
